<body>
<div id="app"></div>
<script>
'use strict';

// ═══════════════════════════════════════════════════
// CONFIGURATION
// ═══════════════════════════════════════════════════
var APP_ID = 'b3ad9d7f263945d6949e6bc6ee6e0e37';

// ═══════════════════════════════════════════════════
// LANGUAGES — name, flag, Speech Recognition code, Google Translate code, TTS code
// ═══════════════════════════════════════════════════
var LANGS = [
  {n:'Telugu',     f:'🇮🇳', sr:'te-IN', g:'te', tts:'te-IN'},
  {n:'English',    f:'🇺🇸', sr:'en-US', g:'en', tts:'en-US'},
  {n:'Hindi',      f:'🇮🇳', sr:'hi-IN', g:'hi', tts:'hi-IN'},
  {n:'Tamil',      f:'🇮🇳', sr:'ta-IN', g:'ta', tts:'ta-IN'},
  {n:'Kannada',    f:'🇮🇳', sr:'kn-IN', g:'kn', tts:'kn-IN'},
  {n:'Malayalam',  f:'🇮🇳', sr:'ml-IN', g:'ml', tts:'ml-IN'},
  {n:'Spanish',    f:'🇪🇸', sr:'es-ES', g:'es', tts:'es-ES'},
  {n:'French',     f:'🇫🇷', sr:'fr-FR', g:'fr', tts:'fr-FR'},
  {n:'German',     f:'🇩🇪', sr:'de-DE', g:'de', tts:'de-DE'},
  {n:'Japanese',   f:'🇯🇵', sr:'ja-JP', g:'ja', tts:'ja-JP'},
  {n:'Chinese',    f:'🇨🇳', sr:'zh-CN', g:'zh', tts:'zh-CN'},
  {n:'Arabic',     f:'🇸🇦', sr:'ar-SA', g:'ar', tts:'ar-SA'},
  {n:'Korean',     f:'🇰🇷', sr:'ko-KR', g:'ko', tts:'ko-KR'},
  {n:'Portuguese', f:'🇧🇷', sr:'pt-BR', g:'pt', tts:'pt-BR'},
  {n:'Russian',    f:'🇷🇺', sr:'ru-RU', g:'ru', tts:'ru-RU'},
];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
var S = {
  view: 'home',
  myLang: LANGS[0],
  theirLang: LANGS[1],
  myCode: makeCode(),
  joinCode: '',
  // Call state
  client: null,
  localTrack: null,
  streamId: null,
  inCall: false,
  remoteCount: 0,
  callSecs: 0,
  callTimer: null,
  muted: false,
  // Translation
  recog: null,
  subs: [],
  bufText: '',
  bufTimer: null,
  lastTranslated: '',
  // TTS
  ttsReady: false,
  voices: [],
};

// ═══════════════════════════════════════════════════
// TTS ENGINE — works on mobile after user gesture
// ═══════════════════════════════════════════════════
function initTTS() {
  if (!window.speechSynthesis) return;
  // Load voices
  function loadV() {
    S.voices = window.speechSynthesis.getVoices() || [];
  }
  window.speechSynthesis.onvoiceschanged = loadV;
  loadV();
}
initTTS();

function unlockTTS() {
  // Must be called from user gesture (button tap)
  if (S.ttsReady) return;
  if (!window.speechSynthesis) return;
  try {
    var u = new SpeechSynthesisUtterance('');
    u.volume = 0;
    window.speechSynthesis.speak(u);
    window.speechSynthesis.cancel();
    S.ttsReady = true;
  } catch(e) {}
  // Also reload voices
  S.voices = window.speechSynthesis.getVoices() || [];
}

function speakText(text, ttsCode) {
  if (!text || !text.trim()) return;
  if (!window.speechSynthesis) return;
  try {
    window.speechSynthesis.cancel();
    // Short delay so cancel takes effect
    setTimeout(function() {
      var u = new SpeechSynthesisUtterance(text.trim());
      u.lang = ttsCode;
      u.rate = 0.9;
      u.pitch = 1.0;
      u.volume = 1.0;

      // Find best voice for this language
      var base = ttsCode.split('-')[0];
      var voices = window.speechSynthesis.getVoices() || S.voices || [];
      var voice =
        voices.find(function(v){ return v.lang === ttsCode; }) ||
        voices.find(function(v){ return v.lang.startsWith(ttsCode); }) ||
        voices.find(function(v){ return v.lang.startsWith(base+'-'); }) ||
        voices.find(function(v){ return v.lang.startsWith(base); }) ||
        null;
      if (voice) u.voice = voice;

      u.onerror = function(e) { console.log('TTS err:', e.error, ttsCode); };
      window.speechSynthesis.speak(u);
    }, 80);
  } catch(e) { console.log('speakText err:', e); }
}

// ═══════════════════════════════════════════════════
// TRANSLATION — Google Translate free API
// ═══════════════════════════════════════════════════
async function translate(text, fromG, toG) {
  if (!text || !text.trim()) return '';
  if (fromG === toG) return text;
  text = text.trim();

  // Try 1: explicit source language
  var r1 = await googleTranslate(text, fromG, toG);
  if (r1 && r1.toLowerCase() !== text.toLowerCase()) return r1;

  // Try 2: auto-detect (handles Roman script input like "Namaskaram", "ela unnav")
  var r2 = await googleTranslate(text, 'auto', toG);
  if (r2 && r2.toLowerCase() !== text.toLowerCase()) return r2;

  // Try 3: MyMemory fallback
  var r3 = await myMemory(text, fromG, toG);
  if (r3) return r3;

  // Return best effort
  return r1 || r2 || text;
}

async function googleTranslate(text, from, to) {
  try {
    var url = 'https://translate.googleapis.com/translate_a/single' +
      '?client=gtx&sl=' + from + '&tl=' + to + '&dt=t&ie=UTF-8&oe=UTF-8' +
      '&q=' + encodeURIComponent(text);
    var res = await fetch(url);
    if (!res.ok) return null;
    var d = await res.json();
    if (d && d[0] && Array.isArray(d[0])) {
      var out = d[0].reduce(function(a,c){ return a+(c&&c[0]?c[0]:''); }, '').trim();
      return out || null;
    }
  } catch(e) {}
  return null;
}

async function myMemory(text, from, to) {
  try {
    var url = 'https://api.mymemory.translated.net/get?q=' +
      encodeURIComponent(text) + '&langpair=' + from + '|' + to;
    var res = await fetch(url);
    var d = await res.json();
    if (d.responseStatus === 200 && d.responseData && d.responseData.translatedText) {
      var r = d.responseData.translatedText.trim();
      if (r && r.indexOf('MYMEMORY WARNING') < 0) return r;
    }
  } catch(e) {}
  return null;
}

// ═══════════════════════════════════════════════════
// AGORA — Voice call
// ═══════════════════════════════════════════════════
async function initAgora() {
  S.client = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });

  // Remote user joined
  S.client.on('user-published', async function(user, mediaType) {
    await S.client.subscribe(user, mediaType);
    if (mediaType === 'audio') {
      user.audioTrack.play();
      S.remoteCount++;
      S.remoteUsers = S.remoteUsers || {};
      S.remoteUsers[user.uid] = user;
      if (S.view === 'calling' || S.view === 'waiting') {
        goInCall();
      }
    }
  });

  S.client.on('user-unpublished', function(user) {
    S.remoteCount = Math.max(0, S.remoteCount - 1);
  });

  S.client.on('user-left', function(user) {
    S.remoteCount = Math.max(0, S.remoteCount - 1);
    if (S.remoteCount <= 0 && S.inCall) {
      doEndCall();
      setTimeout(function(){ alert('Other person ended the call.'); }, 300);
    }
  });

  // Receive translated text from other person
  // other person translated THEIR speech → MY language → sent here
  S.client.on('stream-message', function(uid, data) {
    try {
      var msg = JSON.parse(new TextDecoder().decode(data));
      if (msg.type === 'xlat' && msg.xlat) {
        // Show subtitle
        addSub('them', msg.orig || '', msg.xlat);
        // Speak in MY language (translation already done by sender into my lang)
        speakText(msg.xlat, S.myLang.tts);
      }
    } catch(e) {}
  });
}

async function joinAgora(channelName) {
  try {
    var uid = Math.floor(Math.random() * 900000) + 100000;
    await S.client.join(APP_ID, channelName, null, uid);
    S.localTrack = await AgoraRTC.createMicrophoneAudioTrack({
      encoderConfig: 'music_standard',
      AEC: true, ANS: true, AGC: true
    });
    await S.client.publish([S.localTrack]);
    try {
      S.streamId = await S.client.createDataStream({ reliable: true, ordered: true });
    } catch(e) { S.streamId = null; }
    return true;
  } catch(e) {
    alert('Connection failed:\n' + (e.message || e) + '\n\nMic permission allow cheyyi.');
    return false;
  }
}

function sendStream(orig, xlat, myLangTts) {
  if (S.streamId === null || !xlat) return;
  try {
    var p = JSON.stringify({
      type: 'xlat',
      orig: (orig || '').substring(0, 120),
      xlat: xlat.substring(0, 200),
      // Tell receiver what TTS language to use (my language = their target)
      // Actually sender already translated to theirLang, so receiver speaks theirLang
      tts: myLangTts
    });
    var b = new TextEncoder().encode(p);
    if (b.length <= 1000) S.client.sendStreamMessage(S.streamId, b);
  } catch(e) {}
}

// ═══════════════════════════════════════════════════
// CALL FLOW
// ═══════════════════════════════════════════════════
async function doStartCall() {
  unlockTTS();
  var code = (S.joinCode || '').trim().toUpperCase();
  if (!code) { alert('Room Code enter cheyyi!'); return; }
  if (code === S.myCode) { alert('Own code kadhu! Other person code enter cheyyi.'); return; }
  S.view = 'calling'; render();
  var ok = await joinAgora(code);
  if (!ok) { S.view = 'home'; render(); }
}

async function doCreateRoom() {
  unlockTTS();
  S.view = 'waiting'; render();
  var ok = await joinAgora(S.myCode);
  if (!ok) { S.view = 'home'; render(); }
}

function goInCall() {
  S.view = 'incall';
  S.inCall = true;
  S.callSecs = 0;
  S.subs = [];
  if (S.callTimer) clearInterval(S.callTimer);
  S.callTimer = setInterval(function() {
    S.callSecs++;
    var el = document.getElementById('timerEl');
    if (el) el.textContent = fmtTime(S.callSecs);
  }, 1000);
  startSR();
  render();
}

async function doEndCall() {
  if (S.callTimer) { clearInterval(S.callTimer); S.callTimer = null; }
  if (S.bufTimer) { clearTimeout(S.bufTimer); S.bufTimer = null; }
  stopSR();
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (S.localTrack) {
    try { S.localTrack.stop(); S.localTrack.close(); } catch(e) {}
    S.localTrack = null;
  }
  try { if (S.client) await S.client.leave(); } catch(e) {}
  S.inCall = false; S.remoteCount = 0;
  S.subs = []; S.callSecs = 0;
  S.streamId = null; S.muted = false;
  S.bufText = ''; S.lastTranslated = '';
  S.view = 'home';
  render();
}

// ═══════════════════════════════════════════════════
// SPEECH RECOGNITION
// ═══════════════════════════════════════════════════
function startSR() {
  stopSR();
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    addSub('sys', '⚠️ Voice SR not supported in this browser. Type below.', '');
    return;
  }
  var r = new SR();
  r.lang = S.myLang.sr;
  r.interimResults = true;
  r.continuous = true;
  r.maxAlternatives = 1;

  var intId = null;
  var lastFinal = '';

  r.onresult = function(e) {
    var fin = '', intr = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) fin += e.results[i][0].transcript;
      else intr += e.results[i][0].transcript;
    }

    // Live preview
    if (intr) {
      if (!intId) {
        intId = 'int_' + Date.now();
        S.subs.push({ id: intId, who: 'me', orig: intr, xlat: '', live: true });
      } else {
        var ix = S.subs.findIndex(function(x){ return x.id === intId; });
        if (ix >= 0) S.subs[ix].orig = intr;
      }
      updateSubsUI();
    }

    if (fin) {
      // Remove live preview
      if (intId) {
        S.subs = S.subs.filter(function(x){ return x.id !== intId; });
        intId = null;
      }
      fin = fin.trim();
      if (!fin) return;

      // Buffer text for full sentence
      S.bufText = (S.bufText ? S.bufText + ' ' : '') + fin;
      if (S.bufTimer) clearTimeout(S.bufTimer);

      // Show buffered text with "translating" indicator
      var sid = 'buf_' + Date.now();
      // Replace last pending subtitle if exists
      var lastPending = -1;
      for (var j = S.subs.length - 1; j >= 0; j--) {
        if (S.subs[j].who === 'me' && S.subs[j].pending) { lastPending = j; break; }
      }
      var curBuf = S.bufText;
      if (lastPending >= 0) {
        S.subs[lastPending].orig = curBuf;
        sid = S.subs[lastPending].id;
      } else {
        S.subs.push({ id: sid, who: 'me', orig: curBuf, xlat: '…', pending: true });
        if (S.subs.length > 40) S.subs = S.subs.slice(-40);
      }
      updateSubsUI();

      // Translate after 1s pause (complete sentence)
      var capturedBuf = S.bufText;
      S.bufTimer = setTimeout(function() {
        if (S.bufText !== capturedBuf) return; // new text came in
        var toSend = S.bufText;
        S.bufText = '';
        if (!toSend || toSend === lastFinal) return;
        lastFinal = toSend;

        translate(toSend, S.myLang.g, S.theirLang.g).then(function(xlat) {
          if (!xlat) return;
          // Update subtitle
          var idx = S.subs.findIndex(function(x){ return x.id === sid; });
          if (idx >= 0) {
            S.subs[idx].orig = toSend;
            S.subs[idx].xlat = xlat;
            S.subs[idx].pending = false;
          }
          updateSubsUI();
          // Send to other person — they receive xlat in THEIR language (my theirLang)
          // Other person's myLang = our theirLang → they use theirLang.tts to speak
          sendStream(toSend, xlat, S.theirLang.tts);
        });
      }, 1000);
    }
  };

  r.onerror = function(e) {
    if (e.error === 'not-allowed') addSub('sys', '⚠️ Mic blocked. Type below.', '');
  };

  r.onend = function() {
    if (S.inCall && !S.muted && S.recog === r) {
      setTimeout(function(){ try { r.start(); } catch(e) {} }, 300);
    }
  };

  S.recog = r;
  try { r.start(); } catch(e) {}
}

function stopSR() {
  if (S.recog) { try { S.recog.stop(); } catch(e) {} S.recog = null; }
}

// ═══════════════════════════════════════════════════
// SUBTITLE HELPERS
// ═══════════════════════════════════════════════════
function addSub(who, orig, xlat) {
  S.subs.push({ id: 's_' + Date.now(), who: who, orig: orig, xlat: xlat });
  if (S.subs.length > 40) S.subs = S.subs.slice(-40);
  updateSubsUI();
}

function updateSubsUI() {
  var el = document.getElementById('subsBox');
  if (!el) return;
  el.innerHTML = buildSubs();
  el.scrollTop = el.scrollHeight;
}

function buildSubs() {
  if (!S.subs.length)
    return '<div style="text-align:center;color:#2a4a5a;font-size:13px;padding:40px 16px">🎙 Speak — translation appears here</div>';
  return S.subs.map(function(s) {
    var me = s.who === 'me';
    if (s.who === 'sys')
      return '<div style="text-align:center;font-size:11px;color:#5a7a8a;padding:6px 0">' + esc(s.orig) + '</div>';
    return (
      '<div style="display:flex;flex-direction:column;align-items:' + (me ? 'flex-end' : 'flex-start') + ';margin-bottom:12px;animation:slideUp .2s ease">' +
        '<div style="font-size:9px;color:#4a7a8a;margin-bottom:3px;font-weight:600">' +
          (me ? 'You ' + S.myLang.f : 'Them ' + S.theirLang.f) +
        '</div>' +
        '<div style="background:' + (me ? '#172040' : '#122030') + ';border:1px solid ' + (me ? '#2a4a8a' : '#1a3a5a') + ';border-radius:' + (me ? '14px 14px 3px 14px' : '14px 14px 14px 3px') + ';padding:9px 13px;max-width:85%;' + (s.live ? 'opacity:.5' : '') + '">' +
          '<div style="font-size:13px;color:#d0e8f4;line-height:1.5">' + esc(s.orig) + '</div>' +
        '</div>' +
        (s.xlat ?
          '<div style="background:' + (me ? '#0a2a1a' : '#081e14') + ';border:1px solid #1a5a38;border-radius:' + (me ? '3px 14px 14px 14px' : '14px 3px 14px 14px') + ';padding:7px 13px;max-width:85%;margin-top:2px">' +
            '<div style="font-size:12px;color:#00e5a0;line-height:1.5">' + esc(s.xlat) + '</div>' +
          '</div>' : '') +
      '</div>'
    );
  }).join('');
}

function esc(t) { return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════════════════
// SEND TYPED MESSAGE
// ═══════════════════════════════════════════════════
function sendTyped() {
  var el = document.getElementById('typeIn');
  if (!el) return;
  var text = el.value.trim();
  if (!text) return;
  el.value = ''; el.focus();

  var sid = 'f_' + Date.now();
  S.subs.push({ id: sid, who: 'me', orig: text, xlat: '…' });
  updateSubsUI();

  translate(text, S.myLang.g, S.theirLang.g).then(function(xlat) {
    var idx = S.subs.findIndex(function(x){ return x.id === sid; });
    if (idx >= 0) { S.subs[idx].xlat = xlat || '…'; }
    updateSubsUI();
    if (xlat) sendStream(text, xlat, S.theirLang.tts);
  });
}

// ═══════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════
function toggleMute() {
  S.muted = !S.muted;
  if (S.localTrack) S.localTrack.setEnabled(!S.muted);
  if (S.muted) stopSR();
  else startSR();
  render();
}

function copyCode() {
  var code = S.myCode;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(function(){
      alert('Copied!\n\n' + code + '\n\nShare via WhatsApp!');
    });
  } else { alert('Room Code:\n\n' + code); }
}

function shareCode() {
  var url = window.location.href.split('?')[0];
  var msg = '🌐 D Lingo Call!\nRoom Code: ' + S.myCode + '\n\nOpen: ' + url + '\nEnter code → Call & Translate!';
  if (navigator.share) navigator.share({ title: 'D Lingo', text: msg }).catch(function(){});
  else copyCode();
}

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function makeCode() {
  var c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789', s = '';
  for (var i = 0; i < 8; i++) s += c[Math.floor(Math.random() * c.length)];
  return s;
}
function fmtTime(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render() {
  var app = document.getElementById('app');
  if (!app) return;
  switch(S.view) {
    case 'home':    app.innerHTML = viewHome(); break;
    case 'calling': app.innerHTML = viewCalling(); break;
    case 'waiting': app.innerHTML = viewWaiting(); break;
    case 'incall':  app.innerHTML = viewInCall(); break;
  }
  // Restore select values
  setTimeout(function() {
    var ml = document.getElementById('selMyLang');
    var tl = document.getElementById('selTheirLang');
    if (ml) { var mi = LANGS.findIndex(function(l){ return l.sr === S.myLang.sr; }); if(mi>=0) ml.value = mi; }
    if (tl) { var ti = LANGS.findIndex(function(l){ return l.sr === S.theirLang.sr; }); if(ti>=0) tl.value = ti; }
  }, 10);
}

// ═══════════════════════════════════════════════════
// VIEWS
// ═══════════════════════════════════════════════════
function viewHome() {
  var myI = LANGS.findIndex(function(l){ return l.sr === S.myLang.sr; });
  var thI = LANGS.findIndex(function(l){ return l.sr === S.theirLang.sr; });
  var opts = LANGS.map(function(l,i){ return '<option value="'+i+'">'+(l.f)+' '+l.n+'</option>'; }).join('');

  return `
  <div class="screen" style="background:linear-gradient(170deg,#060d14 0%,#0a1a2a 100%)">
  <div style="padding:16px 18px 8px;flex-shrink:0">
    <div style="font-size:26px;font-weight:800;color:#00e5a0;letter-spacing:-.3px">🌐 D Lingo</div>
    <div style="font-size:11px;color:#4a7a8a">Live Call Translator • Free • No API Key</div>
    <div id="sdkStatus" style="font-size:9px;color:#2a5a4a;margin-top:2px">Loading…</div>
  </div>

  <div class="scrollable" style="padding:0 14px 24px">

  <!-- Language Selection — TOP PRIORITY -->
  <div style="background:#0d1e2e;border:1px solid #1e3a50;border-radius:16px;padding:14px;margin-bottom:12px">
    <div style="font-size:10px;color:#4a7a8a;letter-spacing:.08em;margin-bottom:10px;font-weight:600">🌐 SELECT YOUR LANGUAGES</div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="flex:1">
        <div style="font-size:10px;color:#4a7a8a;margin-bottom:5px">I speak</div>
        <select id="selMyLang" value="${myI}"
          onchange="S.myLang=LANGS[this.value];render()"
          style="width:100%;background:#060d14;border:1px solid #1e3a50;border-radius:10px;color:#e8f4f0;padding:10px 10px;font-size:13px;-webkit-appearance:none">
          ${opts}
        </select>
      </div>
      <div style="font-size:22px;color:#00e5a0;flex-shrink:0;margin-top:14px;cursor:pointer"
        onclick="var t=S.myLang;S.myLang=S.theirLang;S.theirLang=t;render()">⇄</div>
      <div style="flex:1">
        <div style="font-size:10px;color:#4a7a8a;margin-bottom:5px">They speak</div>
        <select id="selTheirLang" value="${thI}"
          onchange="S.theirLang=LANGS[this.value];render()"
          style="width:100%;background:#060d14;border:1px solid #1e3a50;border-radius:10px;color:#e8f4f0;padding:10px 10px;font-size:13px;-webkit-appearance:none">
          ${opts}
        </select>
      </div>
    </div>
    <div style="margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;padding:8px;background:#060d14;border-radius:10px;border:1px solid #1e3a50">
      <span style="font-size:20px">${S.myLang.f}</span>
      <span style="font-size:12px;color:#e8f4f0;font-weight:600">${S.myLang.n}</span>
      <span style="color:#00e5a0;font-size:14px">→</span>
      <span style="font-size:12px;color:#e8f4f0;font-weight:600">${S.theirLang.n}</span>
      <span style="font-size:20px">${S.theirLang.f}</span>
    </div>
  </div>

  <!-- Room Code -->
  <div style="background:#0d1e2e;border:1px solid #1e3a50;border-radius:16px;padding:14px;margin-bottom:12px">
    <div style="font-size:10px;color:#4a7a8a;letter-spacing:.08em;margin-bottom:10px;font-weight:600">📱 YOUR ROOM CODE — Share with friend</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div style="flex:1;font-size:22px;font-weight:800;color:#00e5a0;letter-spacing:4px;text-align:center;background:#060d14;border:1px solid #1a5a40;border-radius:10px;padding:11px 8px">${S.myCode}</div>
      <button onclick="copyCode()" style="width:44px;height:44px;background:#0d3325;border:1px solid #1a5a40;border-radius:10px;font-size:20px">📋</button>
      <button onclick="shareCode()" style="width:44px;height:44px;background:#0d3325;border:1px solid #1a5a40;border-radius:10px;font-size:20px">📤</button>
    </div>
    <button onclick="doCreateRoom()"
      style="width:100%;padding:13px;border-radius:12px;background:#0d3325;border:1px solid #1a5a40;color:#00e5a0;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px">
      📞 Wait for Call (Open My Room)
    </button>
  </div>

  <!-- Call Someone -->
  <div style="background:#0d1e2e;border:1px solid #1e3a50;border-radius:16px;padding:14px;margin-bottom:12px">
    <div style="font-size:10px;color:#4a7a8a;letter-spacing:.08em;margin-bottom:10px;font-weight:600">📞 CALL SOMEONE — Enter their code</div>
    <input id="joinIn" type="text" value="${S.joinCode}" placeholder="Enter Room Code (e.g. ABCD1234)"
      oninput="S.joinCode=this.value.toUpperCase();this.value=S.joinCode"
      onkeydown="if(event.key==='Enter')doStartCall()"
      style="width:100%;background:#060d14;border:1px solid #1e3a50;border-radius:10px;color:#e8f4f0;padding:12px 14px;font-size:15px;letter-spacing:3px;text-align:center;margin-bottom:10px"
      autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button onclick="doStartCall()"
      style="width:100%;padding:15px;border-radius:14px;background:linear-gradient(135deg,#00e5a0,#00b87d);color:#030a10;font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center;gap:10px;animation:glow 2s infinite;letter-spacing:.3px">
      📞 Call & Translate
    </button>
  </div>

  <!-- How it works -->
  <div style="background:#080e18;border:1px solid #1e3a50;border-radius:14px;padding:14px">
    <div style="font-size:11px;font-weight:700;color:#e8f4f0;margin-bottom:10px">💡 How it works</div>
    ${['Share Room Code via WhatsApp', 'Person A: "Wait for Call"', 'Person B: Enter code → "Call & Translate"', 'Speak — voice auto translates in real time! 🔊'].map(function(s,i){
      return '<div style="display:flex;gap:10px;margin-bottom:8px"><div style="min-width:20px;height:20px;border-radius:50%;background:#0d3325;border:1px solid #1a5a40;color:#00e5a0;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center">'+(i+1)+'</div><div style="font-size:12px;color:#4a7a8a;line-height:1.6">'+s+'</div></div>';
    }).join('')}
    <div style="font-size:10px;color:#2a5a4a;margin-top:4px">⚠️ Not for emergency use. Voice output needs phone speaker ON.</div>
  </div>

  </div></div>`;
}

function viewCalling() {
  return `
  <div class="screen" style="background:#060d14;align-items:center;justify-content:center;gap:18px;padding:32px">
    <div style="font-size:56px">🌐</div>
    <div style="font-size:22px;font-weight:800">Connecting…</div>
    <div style="width:44px;height:44px;border:3px solid #1e3a50;border-top:3px solid #00e5a0;border-radius:50%;animation:spin 1s linear infinite"></div>
    <div id="cStatus" style="font-size:13px;color:#00e5a0;text-align:center">Joining channel…</div>
    <div style="font-size:12px;color:#4a7a8a">Room: <b style="color:#e8f4f0">${esc(S.joinCode)}</b></div>
    <div style="font-size:11px;color:#2a5a4a;text-align:center">Other person join అవ్వాలి…</div>
    <button onclick="doEndCall()"
      style="margin-top:16px;width:68px;height:68px;border-radius:50%;background:#c02020;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px #c0202066">📵</button>
    <div style="font-size:11px;color:#4a7a8a">Cancel</div>
  </div>`;
}

function viewWaiting() {
  return `
  <div class="screen" style="background:#060d14;align-items:center;justify-content:center;gap:16px;padding:32px">
    <div style="position:relative">
      <div style="width:90px;height:90px;border-radius:50%;background:#0d3325;border:3px solid #00e5a0;display:flex;align-items:center;justify-content:center;font-size:42px;animation:glow 2s infinite">📞</div>
      <div style="position:absolute;inset:-10px;border-radius:50%;border:2px solid #00e5a033;animation:ripple 1.5s ease infinite"></div>
    </div>
    <div style="font-size:22px;font-weight:800">Waiting for call…</div>
    <div style="font-size:11px;color:#4a7a8a">Share this code:</div>
    <div style="font-size:26px;font-weight:800;color:#00e5a0;letter-spacing:4px;background:#060d14;border:2px solid #1a5a40;border-radius:14px;padding:14px 28px">${S.myCode}</div>
    <div style="display:flex;gap:12px">
      <button onclick="copyCode()" style="padding:11px 22px;border-radius:12px;background:#0d3325;border:1px solid #1a5a40;color:#00e5a0;font-size:13px;font-weight:600">📋 Copy</button>
      <button onclick="shareCode()" style="padding:11px 22px;border-radius:12px;background:#0d3325;border:1px solid #1a5a40;color:#00e5a0;font-size:13px;font-weight:600">📤 Share</button>
    </div>
    <button onclick="doEndCall()" style="margin-top:4px;padding:12px 36px;border-radius:12px;background:#200a0a;border:1px solid #4a1a1a;color:#ff5555;font-size:14px">Cancel</button>
  </div>`;
}

function viewInCall() {
  var micOn = !S.muted;
  return `
  <div class="screen" style="background:#060d14">

  <!-- Header -->
  <div style="background:#0a1820;padding:12px 16px 10px;flex-shrink:0;border-bottom:1px solid #1a3a4a">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div>
        <div style="font-size:16px;font-weight:800;color:#e8f4f0">Live Call</div>
        <div style="font-size:11px;color:#00e5a0;display:flex;align-items:center;gap:5px;margin-top:2px">
          <div style="width:7px;height:7px;border-radius:50%;background:#00e5a0;animation:pulse 1s infinite"></div>
          ${micOn ? 'Listening &amp; Translating…' : '🔇 Mic Muted'}
        </div>
      </div>
      <div id="timerEl" style="font-size:28px;font-weight:800;color:#e8f4f0;font-variant-numeric:tabular-nums">${fmtTime(S.callSecs)}</div>
    </div>
    <!-- Lang bar -->
    <div style="background:#060d14;border:1px solid #1a3a4a;border-radius:10px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:7px">
        <span style="font-size:20px">${S.myLang.f}</span>
        <span style="font-size:13px;font-weight:600;color:#e8f4f0">${S.myLang.n}</span>
      </div>
      <div style="background:#00e5a0;color:#030a10;border-radius:20px;padding:3px 12px;font-size:10px;font-weight:800;letter-spacing:.5px">🔄 LIVE</div>
      <div style="display:flex;align-items:center;gap:7px">
        <span style="font-size:13px;font-weight:600;color:#e8f4f0">${S.theirLang.n}</span>
        <span style="font-size:20px">${S.theirLang.f}</span>
      </div>
    </div>
  </div>

  <!-- Subtitles -->
  <div id="subsBox" style="flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch">
    ${buildSubs()}
  </div>

  <!-- Type input -->
  <div style="background:#080e18;padding:8px 12px;border-top:1px solid #1a3a4a;flex-shrink:0">
    <div style="font-size:9px;color:#2a5a4a;margin-bottom:5px">⌨️ Mic work avvatle type cheyyi</div>
    <div style="display:flex;gap:8px">
      <input id="typeIn" type="text" placeholder="Type here to translate…"
        onkeydown="if(event.key==='Enter')sendTyped()"
        style="flex:1;background:#0d1e2e;border:1px solid #1a3a4a;border-radius:10px;color:#e8f4f0;padding:9px 12px;font-size:13px"
        autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button onclick="sendTyped()"
        style="padding:9px 16px;border-radius:10px;background:#0d3325;border:1px solid #1a5a40;color:#00e5a0;font-size:13px;font-weight:700">Send</button>
    </div>
  </div>

  <!-- Controls -->
  <div style="background:#0a1820;padding:10px 12px 24px;flex-shrink:0;border-top:1px solid #1a3a4a">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <button onclick="toggleMute()"
        style="padding:12px 0;border-radius:12px;border:1px solid ${micOn?'#1a5a40':'#4a2020'};background:${micOn?'#0d3325':'#2a1010'};color:${micOn?'#00e5a0':'#ff6666'};display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:600">
        <span style="font-size:24px">${micOn?'🎤':'🔇'}</span>${micOn?'Mic ON':'Muted'}
      </button>
      <button style="padding:12px 0;border-radius:12px;border:1px solid #1a5a40;background:#0d3325;color:#00e5a0;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:600">
        <span style="font-size:24px">🔊</span>Speaker
      </button>
    </div>
    <button onclick="doEndCall()"
      style="width:100%;padding:16px;border-radius:14px;background:#c02020;color:#fff;font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px #c0202055;letter-spacing:.3px">
      📵 End Call
    </button>
  </div>

  </div>`;
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════

// Check URL param
var urlP = new URLSearchParams(window.location.search);
var pre = urlP.get('code');
if (pre) S.joinCode = pre.toUpperCase();

// Render immediately
render();

// Wait for Agora SDK
var agoraWait = setInterval(function() {
  if (typeof AgoraRTC !== 'undefined') {
    clearInterval(agoraWait);
    initAgora().then(function() {
      var el = document.getElementById('sdkStatus');
      if (el) el.textContent = '✅ Ready to call';
    }).catch(function() {
      var el = document.getElementById('sdkStatus');
      if (el) el.textContent = '⚠️ Deploy to Netlify for calls';
    });
  }
}, 200);

setTimeout(function() {
  clearInterval(agoraWait);
  var el = document.getElementById('sdkStatus');
  if (el && typeof AgoraRTC === 'undefined')
    el.textContent = '⚠️ Upload to Netlify — local file lo work avvadhu';
}, 12000);

// Suppress cross-origin script errors
window.addEventListener('error', function(e) {
  if (!e.filename || e.message === 'Script error.') return true;
}, true);
</script>
</body>
</html>
