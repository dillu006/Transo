<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0a0f14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="D Lingo"/>
<title>D Lingo – Live Call Translator</title>
<script>
(function(){
  var cdns=[
    'https://unpkg.com/agora-rtc-sdk-ng@4.20.2/AgoraRTC_N-production.min.js',
    'https://cdn.jsdelivr.net/npm/agora-rtc-sdk-ng@4.20.2/AgoraRTC_N-production.min.js',
    'https://download.agora.io/sdk/release/AgoraRTC_N-4.20.2.js'
  ];
  var i=0;
  function load(){
    if(i>=cdns.length){var e=document.getElementById('agoraStatus');if(e)e.textContent='Network error';return;}
    var s=document.createElement('script');s.src=cdns[i];
    s.onload=function(){var e=document.getElementById('agoraStatus');if(e)e.textContent='Ready';window._agoraLoaded=true;};
    s.onerror=function(){i++;load();};
    document.head.appendChild(s);
  }
  load();
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0a0f14;font-family:Outfit,sans-serif;color:#e8f4f0;overflow:hidden}
#root{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none;touch-action:manipulation}
input,select{font-family:inherit;outline:none}
::-webkit-scrollbar{width:0}
.scr{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px #00e5a044}50%{box-shadow:0 0 28px #00e5a099}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes ripple{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.5);opacity:0}}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ─── CONFIG ──────────────────────────────────────────────────
var APP_ID = 'b3ad9d7f263945d6949e6bc6ee6e0e37';
var TOKEN  = null;

// ─── LANGUAGES ───────────────────────────────────────────────
var LANGS = [
  {name:'Telugu',     flag:'🇮🇳', code:'te-IN'},
  {name:'English',    flag:'🇺🇸', code:'en-US'},
  {name:'Hindi',      flag:'🇮🇳', code:'hi-IN'},
  {name:'Tamil',      flag:'🇮🇳', code:'ta-IN'},
  {name:'Spanish',    flag:'🇪🇸', code:'es-ES'},
  {name:'French',     flag:'🇫🇷', code:'fr-FR'},
  {name:'German',     flag:'🇩🇪', code:'de-DE'},
  {name:'Japanese',   flag:'🇯🇵', code:'ja-JP'},
  {name:'Chinese',    flag:'🇨🇳', code:'zh-CN'},
  {name:'Arabic',     flag:'🇸🇦', code:'ar-SA'},
  {name:'Korean',     flag:'🇰🇷', code:'ko-KR'},
  {name:'Portuguese', flag:'🇧🇷', code:'pt-BR'},
];

// ─── STATE ───────────────────────────────────────────────────
var S = {
  screen:'home', client:null, localTrack:null,
  remoteUsers:{}, channel:'', myCode:'', joinCode:'',
  callSecs:0, callTmr:null, muted:false,
  myLang:LANGS[0], theirLang:LANGS[1],
  subtitles:[], recog:null, inCall:false,
  remoteCount:0, streamId:null,
  ttsQueue:[], ttsBusy:false,
};

// ─── TTS QUEUE — no overlap/cancel bug ───────────────────────
// FIX: Queue speeches so they don't cut each other
function speakQ(text, langCode) {
  if (!text || text.length < 2) return;
  S.ttsQueue.push({text:text, lang:langCode});
  if (!S.ttsBusy) nextQ();
}
function nextQ() {
  if (!S.ttsQueue.length) { S.ttsBusy=false; return; }
  S.ttsBusy = true;
  var item = S.ttsQueue.shift();
  var u = new SpeechSynthesisUtterance(item.text);
  u.lang = item.lang; u.rate = 0.92;
  u.onend = nextQ; u.onerror = nextQ;
  window.speechSynthesis.speak(u);
}
function clearQ() {
  S.ttsQueue=[]; S.ttsBusy=false;
  window.speechSynthesis.cancel();
}

// ─── AGORA INIT ──────────────────────────────────────────────
async function initAgora() {
  S.client = AgoraRTC.createClient({mode:'rtc', codec:'vp8'});

  S.client.on('user-published', async function(user, mediaType) {
    await S.client.subscribe(user, mediaType);
    if (mediaType === 'audio') {
      user.audioTrack.play();
      S.remoteCount++;
      S.remoteUsers[user.uid] = user;
      updateStatus('Connected!');
      if (S.screen === 'calling' || S.screen === 'waiting') {
        S.screen = 'incall'; S.inCall = true;
        startTimer(); startRecognition(); R();
      }
    }
  });

  S.client.on('user-unpublished', function(user, mediaType) {
    if (mediaType === 'audio') {
      delete S.remoteUsers[user.uid];
      S.remoteCount = Math.max(0, S.remoteCount-1);
    }
  });

  S.client.on('user-left', function(user) {
    delete S.remoteUsers[user.uid];
    S.remoteCount = Math.max(0, S.remoteCount-1);
    if (S.remoteCount <= 0 && S.inCall) {
      endCall();
      setTimeout(function(){ alert('Other person ended the call.'); }, 300);
    }
  });

  // ── RECEIVE translated text from other person ──────────────
  // When other person speaks: their app translates → sends text here
  // We display it and speak in OUR language
  S.client.on('stream-message', function(uid, data) {
    try {
      var msg = JSON.parse(new TextDecoder().decode(data));
      if (msg.type === 'xlat') {
        S.subtitles.push({id:'r'+Date.now(), who:'them', orig:msg.orig, xlat:msg.xlat});
        if (S.subtitles.length > 40) S.subtitles = S.subtitles.slice(-40);
        updateSubs();
        // Speak their message in MY language so I understand
        speakQ(msg.xlat, S.myLang.code);
      }
    } catch(e) {}
  });
}

// ─── JOIN CHANNEL ────────────────────────────────────────────
async function joinChannel(name) {
  try {
    S.channel = name;
    var uid = Math.floor(Math.random()*900000)+100000;
    await S.client.join(APP_ID, name, TOKEN, uid);
    S.localTrack = await AgoraRTC.createMicrophoneAudioTrack({
      encoderConfig:'speech_low_quality', AEC:true, ANS:true, AGC:true
    });
    await S.client.publish([S.localTrack]);
    try {
      S.streamId = await S.client.createDataStream({reliable:true, ordered:true});
    } catch(e) { S.streamId=null; }
    return true;
  } catch(e) {
    alert('Connection failed: '+(e.message||e)+'\n\nMic permission check cheyyi.');
    return false;
  }
}

// ─── CALL FUNCTIONS ──────────────────────────────────────────
async function startCall() {
  var code = (S.joinCode||'').trim().toUpperCase();
  if (!code) { alert('Room Code enter cheyyi!'); return; }
  if (code === S.myCode) { alert('Mee own code! Other person code enter cheyyi.'); return; }
  S.screen = 'calling'; R();
  var ok = await joinChannel(code);
  if (!ok) { S.screen='home'; R(); return; }
  // FIX: No 5s auto-transition. user-published event handles it.
}

async function createRoom() {
  S.screen = 'waiting'; R();
  var ok = await joinChannel(S.myCode);
  if (!ok) { S.screen='home'; R(); return; }
  // FIX: No duplicate listener. initAgora handles transition.
}

async function endCall() {
  if (S.callTmr) { clearInterval(S.callTmr); S.callTmr=null; }
  if (S.recog) { try{S.recog.stop();}catch(e){} S.recog=null; }
  if (S.localTrack) { try{S.localTrack.stop();S.localTrack.close();}catch(e){} S.localTrack=null; }
  clearQ();
  try { if(S.client) await S.client.leave(); } catch(e) {}
  // FIX: Full state reset
  S.inCall=false; S.remoteUsers={}; S.remoteCount=0;
  S.subtitles=[]; S.callSecs=0; S.streamId=null;
  S.muted=false; S.screen='home';
  R();
}

// ─── TIMER ───────────────────────────────────────────────────
function startTimer() {
  S.callSecs = 0;
  if (S.callTmr) clearInterval(S.callTmr);
  S.callTmr = setInterval(function(){
    S.callSecs++;
    var el = document.getElementById('callTimer');
    if (el) el.textContent = fmt(S.callSecs);
  }, 1000);
}
function fmt(s){ return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

// ─── SPEECH RECOGNITION ──────────────────────────────────────
function startRecognition() {
  if (S.recog) { try{S.recog.stop();}catch(e){} S.recog=null; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    pushSub('system','Mic SR not supported. Type below to translate.','');
    return;
  }
  var r = new SR();
  r.lang = S.myLang.code;
  r.interimResults = true;
  r.continuous = true;
  r.maxAlternatives = 1;

  var intId = null, lastFinal = '';

  r.onresult = function(e) {
    var fin='', intr='';
    for (var i=e.resultIndex; i<e.results.length; i++) {
      if (e.results[i].isFinal) fin += e.results[i][0].transcript;
      else intr += e.results[i][0].transcript;
    }
    if (intr) {
      if (!intId) {
        intId = 'i'+Date.now();
        S.subtitles.push({id:intId, who:'me', orig:intr, xlat:'', interim:true});
      } else {
        var ix = S.subtitles.findIndex(function(x){return x.id===intId;});
        if (ix>=0) S.subtitles[ix].orig = intr;
      }
      updateSubs();
    }
    if (fin) {
      if (intId) { S.subtitles=S.subtitles.filter(function(x){return x.id!==intId;}); intId=null; }
      fin = fin.trim();
      if (!fin || fin===lastFinal) return; // FIX: deduplicate
      lastFinal = fin;

      var id = 'f'+Date.now();
      S.subtitles.push({id:id, who:'me', orig:fin, xlat:'Translating…'});
      if (S.subtitles.length>40) S.subtitles=S.subtitles.slice(-40);
      updateSubs();

      // Translate MY speech → THEIR language
      doTranslate(fin, S.myLang.name, S.theirLang.name, function(xlat) {
        var idx=S.subtitles.findIndex(function(x){return x.id===id;});
        if (idx>=0) S.subtitles[idx].xlat = xlat;
        updateSubs();
        // FIX: Do NOT play TTS for own speech.
        // My actual voice already goes to them via Agora audio.
        // Only send translated TEXT to other user via data stream.
        sendStream(fin, xlat);
      });
    }
  };

  r.onerror = function(e) {
    if (e.error==='not-allowed') {
      pushSub('system','Mic blocked. Type below.','');
    }
  };

  // FIX: Auto-restart on Android (SR stops unexpectedly)
  r.onend = function() {
    if (S.inCall && !S.muted && S.recog===r) {
      setTimeout(function(){ try{r.start();}catch(e){} }, 250);
    }
  };

  S.recog = r;
  try { r.start(); } catch(e) {}
}

// ─── SEND STREAM MESSAGE ─────────────────────────────────────
function sendStream(origText, xlatText) {
  if (S.streamId===null || !xlatText || xlatText==='…' || xlatText==='(error)') return;
  try {
    var p = JSON.stringify({type:'xlat', orig:origText, xlat:xlatText});
    S.client.sendStreamMessage(S.streamId, new TextEncoder().encode(p));
  } catch(e) {}
}

// ─── CLAUDE TRANSLATE ────────────────────────────────────────
async function doTranslate(text, fromLang, toLang, cb) {
  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        messages:[{role:'user', content:
          'You are a real-time phone call translator.\n'+
          'Translate this '+fromLang+' text to '+toLang+'.\n'+
          'Rules: Return ONLY the translated text. No explanations. No quotes. No extra words.\n\n'+
          'Text to translate: '+text
        }]
      })
    });
    var d = await res.json();
    cb(d.content&&d.content[0] ? d.content[0].text.trim() : '…');
  } catch(e) { cb('(error)'); }
}

// ─── SUBTITLES ───────────────────────────────────────────────
function pushSub(who, orig, xlat) {
  S.subtitles.push({id:'s'+Date.now(), who:who, orig:orig, xlat:xlat});
  if (S.subtitles.length>40) S.subtitles=S.subtitles.slice(-40);
  updateSubs();
}
function updateSubs() {
  var el=document.getElementById('subsBox');
  if (!el) return;
  el.innerHTML=subsHTML();
  el.scrollTop=el.scrollHeight;
}
function subsHTML() {
  if (!S.subtitles.length)
    return '<div style="text-align:center;color:#2a3a4a;font-size:13px;padding:40px 16px">🎙 Speak — subtitles appear here</div>';
  return S.subtitles.map(function(s){
    var me = s.who==='me';
    if (s.who==='system')
      return '<div style="text-align:center;font-size:11px;color:#5a7a8a;padding:6px 0">'+esc(s.orig)+'</div>';
    return (
      '<div style="display:flex;flex-direction:column;align-items:'+(me?'flex-end':'flex-start')+';margin-bottom:10px;animation:fadeUp .2s ease">'+
      '<div style="font-size:9px;color:#5a7a8a;margin-bottom:3px">'+(me?'You '+S.myLang.flag:'Them '+S.theirLang.flag)+'</div>'+
      '<div style="background:'+(me?'#1a2a4a':'#1a2330')+';border:1px solid '+(me?'#2a4a8a':'#1e2d3d')+
        ';border-radius:'+(me?'12px 12px 3px 12px':'12px 12px 12px 3px')+
        ';padding:8px 12px;max-width:88%;'+(s.interim?'opacity:.5':'')+'">'  +
      '<div style="font-size:13px;color:#e8f4f0;line-height:1.5">'+esc(s.orig)+'</div></div>'+
      (s.xlat&&!s.interim?
        '<div style="background:'+(me?'#0a2a1e':'#0a1e18')+';border:1px solid #1a5a40;'+
          'border-radius:'+(me?'3px 12px 12px 12px':'12px 3px 12px 12px')+
          ';padding:6px 12px;max-width:88%;margin-top:2px">'+
        '<div style="font-size:12px;color:#00e5a0;line-height:1.5">'+esc(s.xlat)+'</div></div>':'')+
      '</div>'
    );
  }).join('');
}
function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── CONTROLS ────────────────────────────────────────────────
function toggleMute() {
  S.muted = !S.muted;
  if (S.localTrack) S.localTrack.setEnabled(!S.muted);
  if (S.muted && S.recog) { try{S.recog.stop();}catch(e){} }
  else if (!S.muted) startRecognition();
  R();
}

function sendTyped() {
  var el=document.getElementById('typeInput');
  if (!el) return;
  var text=el.value.trim();
  if (!text) return;
  el.value='';
  var id='f'+Date.now();
  S.subtitles.push({id:id, who:'me', orig:text, xlat:'Translating…'});
  updateSubs();
  doTranslate(text, S.myLang.name, S.theirLang.name, function(xlat){
    var idx=S.subtitles.findIndex(function(x){return x.id===id;});
    if (idx>=0) S.subtitles[idx].xlat=xlat;
    updateSubs();
    sendStream(text, xlat);
  });
}

// ─── UTILS ───────────────────────────────────────────────────
function copyCode(){
  navigator.clipboard ? navigator.clipboard.writeText(S.myCode).then(function(){
    alert('Copied! Share via WhatsApp:\n\n'+S.myCode);
  }) : alert('Your Room Code:\n\n'+S.myCode);
}
function shareCode(){
  var url=window.location.href.split('?')[0];
  var msg='🌐 D Lingo Call!\n\nRoom Code: '+S.myCode+'\n\nOpen: '+url+'\nEnter code → Call & Translate!';
  navigator.share ? navigator.share({title:'D Lingo',text:msg}).catch(function(){}) : copyCode();
}
function updateStatus(msg){ var el=document.getElementById('connStatus'); if(el)el.textContent=msg; }
function genCode(){ var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',s=''; for(var i=0;i<8;i++)s+=c[Math.floor(Math.random()*c.length)]; return s; }
function bindScreen(){
  setTimeout(function(){
    var ml=document.getElementById('myLang');
    var tl=document.getElementById('theirLang');
    if(ml){var mi=LANGS.findIndex(function(l){return l.code===S.myLang.code;});if(mi>=0)ml.selectedIndex=mi;}
    if(tl){var ti=LANGS.findIndex(function(l){return l.code===S.theirLang.code;});if(ti>=0)tl.selectedIndex=ti;}
  },50);
}

// ─── RENDER ──────────────────────────────────────────────────
function R(){
  var root=document.getElementById('root');
  if(S.screen==='home')        root.innerHTML=homeHTML();
  else if(S.screen==='calling') root.innerHTML=callingHTML();
  else if(S.screen==='waiting') root.innerHTML=waitingHTML();
  else if(S.screen==='incall')  root.innerHTML=incallHTML();
  bindScreen();
}

// ─── HOME ────────────────────────────────────────────────────
function homeHTML(){
  var myI=LANGS.findIndex(function(l){return l.code===S.myLang.code;});
  var thI=LANGS.findIndex(function(l){return l.code===S.theirLang.code;});
  var opts=LANGS.map(function(l,i){return '<option value="'+i+'"'+(i===myI?' selected':'')+'>'+l.flag+' '+l.name+'</option>';}).join('');
  var opts2=LANGS.map(function(l,i){return '<option value="'+i+'"'+(i===thI?' selected':'')+'>'+l.flag+' '+l.name+'</option>';}).join('');
  return(
    '<div class="scr" style="background:linear-gradient(160deg,#0a0f14 60%,#0a1a2a)">'+
    '<div style="padding:14px 18px 10px;flex-shrink:0">'+
    '<div style="font-size:24px;font-weight:700;color:#00e5a0">🌐 D Lingo</div>'+
    '<div style="font-size:10px;color:#5a7a8a">AI Real-Time Call Translator</div>'+
    '<div id="agoraStatus" style="font-size:9px;color:#3a5a4a">Loading SDK…</div>'+
    '</div>'+
    '<div class="scroll" style="padding:0 16px 24px">'+

    // Step 1
    '<div style="background:#111920;border:1px solid #1e2d3d;border-radius:16px;padding:16px;margin-bottom:12px">'+

    '<div style="display:flex;align-items:center;gap:8px">'+
    '<div style="font-size:20px;font-weight:700;color:#00e5a0;letter-spacing:3px;background:#0a0f14;border:1px solid #1a5a40;border-radius:10px;padding:10px 14px;flex:1;text-align:center">'+S.myCode+'</div>'+

    '</div>'+
    '<button onclick="createRoom()" style="width:100%;margin-top:10px;padding:13px;border-radius:12px;background:#0d3325;border:1px solid #1a5a40;color:#00e5a0;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px">'+
    '📞 Wait for Call (Open My Room)</button>'+
    '</div>'+

    // Step 2
    '<div style="background:#111920;border:1px solid #1e2d3d;border-radius:16px;padding:16px;margin-bottom:12px">'+
    '<div style="font-size:10px;color:#5a7a8a;letter-spacing:.1em;margin-bottom:10px">📞 STEP 2 — CALL SOMEONE</div>'+
    '<input id="joinInput" type="text" value="'+S.joinCode+'" placeholder="Enter Room Code (e.g. ABCD1234)" '+
    'oninput="S.joinCode=this.value.toUpperCase();this.value=this.value.toUpperCase()" '+
    'style="width:100%;background:#0a0f14;border:1px solid #1e2d3d;border-radius:10px;color:#e8f4f0;padding:12px 14px;font-size:15px;letter-spacing:2px;text-align:center;margin-bottom:10px" '+
    'autocomplete="off" autocorrect="off" spellcheck="false"/>'+
    '<button onclick="startCall()" style="width:100%;padding:14px;border-radius:14px;background:linear-gradient(135deg,#00e5a0,#00c896);color:#0a0f14;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px #00e5a044;animation:glow 2s infinite">'+
    '📞 Call & Translate</button>'+
    '</div>'+

    // Language
    '<div style="background:#111920;border:1px solid #1e2d3d;border-radius:16px;padding:16px;margin-bottom:12px">'+
    '<div style="font-size:10px;color:#5a7a8a;letter-spacing:.1em;margin-bottom:12px">🌐 LANGUAGE SETTINGS</div>'+
    '<div style="display:flex;align-items:center;gap:10px">'+
    '<div style="flex:1"><div style="font-size:10px;color:#5a7a8a;margin-bottom:5px">I speak</div>'+
    '<select id="myLang" onchange="S.myLang=LANGS[this.value];R()" style="width:100%;background:#0a0f14;border:1px solid #1e2d3d;border-radius:10px;color:#e8f4f0;padding:10px 12px;font-size:13px">'+opts+'</select></div>'+
    '<div style="font-size:20px;color:#00e5a0;flex-shrink:0;margin-top:14px">⇄</div>'+
    '<div style="flex:1"><div style="font-size:10px;color:#5a7a8a;margin-bottom:5px">They speak</div>'+
    '<select id="theirLang" onchange="S.theirLang=LANGS[this.value];R()" style="width:100%;background:#0a0f14;border:1px solid #1e2d3d;border-radius:10px;color:#e8f4f0;padding:10px 12px;font-size:13px">'+opts2+'</select></div>'+
    '</div></div>'+

    // How to use
    '<div style="background:#0a1520;border:1px solid #1e2d3d;border-radius:14px;padding:14px 16px">'+
    '<div style="font-size:11px;font-weight:600;color:#e8f4f0;margin-bottom:10px">💡 How to use</div>'+
    ['Person A: Copy Room Code → Share via WhatsApp',
     'Person A: Tap "Wait for Call (Open My Room)"',
     'Person B: Enter code → Tap "Call & Translate"',
     'Both speak naturally — AI translates live in real-time 🎙'
    ].map(function(s,i){
      return '<div style="display:flex;gap:10px;margin-bottom:8px">'+
      '<div style="min-width:20px;height:20px;border-radius:50%;background:#0d3325;border:1px solid #1a5a40;color:#00e5a0;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center">'+(i+1)+'</div>'+
      '<div style="font-size:12px;color:#5a7a8a;line-height:1.6">'+s+'</div></div>';
    }).join('')+
    '<div style="font-size:10px;color:#3a5a4a;margin-top:4px">⚠️ Not for emergency use.</div>'+
    '</div>'+
    '</div></div>'
  );
}

// ─── CALLING ────────────────────────────────────────────────
function callingHTML(){
  return(
    '<div class="scr" style="background:#08111a;align-items:center;justify-content:center;padding:32px;gap:16px">'+
    '<div style="font-size:52px">🌐</div>'+
    '<div style="font-size:20px;font-weight:700">Connecting…</div>'+
    '<div style="width:40px;height:40px;border:3px solid #1e2d3d;border-top:3px solid #00e5a0;border-radius:50%;animation:spin 1s linear infinite"></div>'+
    '<div id="connStatus" style="font-size:13px;color:#00e5a0;text-align:center">Joining…</div>'+
    '<div style="font-size:12px;color:#5a7a8a">Room: <b style="color:#e8f4f0">'+S.joinCode+'</b></div>'+
    '<div style="font-size:11px;color:#3a5a4a;text-align:center">Waiting for other person to join…</div>'+
    '<button onclick="endCall()" style="margin-top:20px;width:64px;height:64px;border-radius:50%;background:#cc2222;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px #cc222255">📵</button>'+
    '<div style="font-size:11px;color:#5a7a8a">Cancel</div>'+
    '</div>'
  );
}

// ─── WAITING ────────────────────────────────────────────────
function waitingHTML(){
  return(
    '<div class="scr" style="background:#08111a;align-items:center;justify-content:center;padding:32px;gap:16px">'+
    '<div style="position:relative">'+
    '<div style="width:88px;height:88px;border-radius:50%;background:#0d3325;border:3px solid #00e5a0;display:flex;align-items:center;justify-content:center;font-size:40px;animation:glow 2s infinite">📞</div>'+
    '<div style="position:absolute;inset:-8px;border-radius:50%;border:2px solid #00e5a044;animation:ripple 1.5s ease infinite"></div>'+
    '</div>'+
    '<div style="font-size:20px;font-weight:700">Waiting for call…</div>'+
    '<div style="font-size:24px;font-weight:700;color:#00e5a0;letter-spacing:3px;background:#0a0f14;border:1px solid #1a5a40;border-radius:12px;padding:12px 24px">'+S.myCode+'</div>'+
    '<div style="display:flex;gap:12px">'+
    '<button onclick="copyCode()" style="padding:10px 20px;border-radius:12px;background:#0d3325;border:1px solid #1a5a40;color:#00e5a0;font-size:13px">📋 Copy</button>'+
    '<button onclick="shareCode()" style="padding:10px 20px;border-radius:12px;background:#0d3325;border:1px solid #1a5a40;color:#00e5a0;font-size:13px">📤 Share</button>'+
    '</div>'+
    '<button onclick="endCall()" style="padding:12px 32px;border-radius:12px;background:#2a0f0f;border:1px solid #4a1a1a;color:#ff5555;font-size:14px">Cancel</button>'+
    '</div>'
  );
}

// ─── IN CALL ────────────────────────────────────────────────
function incallHTML(){
  var micOn = !S.muted; // FIX: green = mic active, red = muted
  return(
    '<div class="scr" style="background:#08111a">'+

    // Top
    '<div style="background:#0d1820;padding:12px 16px 10px;flex-shrink:0">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
    '<div>'+
    '<div style="font-size:15px;font-weight:700">Live Call</div>'+
    '<div style="font-size:11px;color:#00e5a0;display:flex;align-items:center;gap:5px">'+
    '<div style="width:7px;height:7px;border-radius:50%;background:#00e5a0;animation:pulse 1s infinite"></div>Translating live</div>'+
    '</div>'+
    '<div id="callTimer" style="font-size:24px;font-weight:700;font-variant-numeric:tabular-nums">'+fmt(S.callSecs)+'</div>'+
    '</div>'+
    '<div style="background:#0a0f14;border:1px solid #1e2d3d;border-radius:10px;padding:8px 14px;display:flex;align-items:center;justify-content:space-between">'+
    '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:18px">'+S.myLang.flag+'</span><span style="font-size:12px">'+S.myLang.name+'</span></div>'+
    '<div style="background:#00e5a0;color:#0a0f14;border-radius:20px;padding:3px 12px;font-size:10px;font-weight:700">AI LIVE</div>'+
    '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px">'+S.theirLang.name+'</span><span style="font-size:18px">'+S.theirLang.flag+'</span></div>'+
    '</div></div>'+

    // Subtitles
    '<div id="subsBox" style="flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:2px;-webkit-overflow-scrolling:touch">'+
    subsHTML()+
    '</div>'+

    // Type fallback
    '<div style="background:#0a1218;padding:8px 14px;flex-shrink:0;border-top:1px solid #1e2d3d">'+
    '<div style="font-size:9px;color:#3a5a4a;margin-bottom:5px">⌨️ Mic SR work avvatle type cheyyi</div>'+
    '<div style="display:flex;gap:8px">'+
    '<input id="typeInput" type="text" placeholder="Type here to translate…" '+
    'onkeydown="if(event.key===\'Enter\')sendTyped()" '+
    'style="flex:1;background:#111920;border:1px solid #1e2d3d;border-radius:10px;color:#e8f4f0;padding:9px 12px;font-size:13px" '+
    'autocomplete="off" autocorrect="off" spellcheck="false"/>'+
    '<button onclick="sendTyped()" style="padding:9px 16px;border-radius:10px;background:#0d3325;border:1px solid #1a5a40;color:#00e5a0;font-size:13px;font-weight:700">Send</button>'+
    '</div></div>'+

    // Controls
    '<div style="background:#0d1820;padding:10px 14px 24px;flex-shrink:0">'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">'+
    cbtn(micOn?'🎤':'🔇', micOn?'Mic ON':'Muted', micOn, 'toggleMute()')+
    cbtn('🔊','Speaker',true,'void(0)')+
    '</div>'+
    '<button onclick="endCall()" style="width:100%;padding:16px;border-radius:14px;background:#cc2222;color:#fff;font-weight:700;font-size:17px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 16px #cc222255">'+
    '📵 End Call</button>'+
    '</div>'+
    '</div>'
  );
}
function cbtn(icon,label,on,fn){
  return '<button onclick="'+fn+'" style="padding:11px 0;border-radius:12px;border:1px solid '+(on?'#1a5a40':'#4a2020')+
    ';background:'+(on?'#0d3325':'#2a1010')+';color:'+(on?'#00e5a0':'#ff6666')+
    ';display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px">'+
    '<span style="font-size:22px">'+icon+'</span>'+label+'</button>';
}

// ─── INIT ────────────────────────────────────────────────────
S.myCode = genCode();
var urlP = new URLSearchParams(window.location.search);
var pre = urlP.get('code');
if (pre) S.joinCode = pre.toUpperCase();
R();

var aw = setInterval(function(){
  if (typeof AgoraRTC !== 'undefined') {
    clearInterval(aw);
    initAgora().catch(function(e){
      var el=document.getElementById('agoraStatus');
      if(el)el.textContent='SDK error – deploy to HTTPS';
    });
  }
}, 200);
setTimeout(function(){ clearInterval(aw); }, 15000);
</script>
