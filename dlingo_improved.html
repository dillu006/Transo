<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>D Lingo Improved</title>
</head>
<body style="font-family:Arial;background:#0a0f14;color:white;text-align:center;padding:20px">

<h2>🌐 D Lingo - Improved Version</h2>

<p>Enter text to translate:</p>
<input id="inputText" style="padding:10px;width:80%"><br><br>

<select id="from">
<option value="te">Telugu</option>
<option value="en">English</option>
<option value="hi">Hindi</option>
</select>

<select id="to">
<option value="en">English</option>
<option value="te">Telugu</option>
<option value="hi">Hindi</option>
</select>

<br><br>
<button onclick="translateText()" style="padding:10px 20px">Translate</button>

<h3 id="output"></h3>

<script>
async function translateText() {
  const text = document.getElementById("inputText").value;
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;

  const url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl="
    + from + "&tl=" + to + "&dt=t&q=" + encodeURIComponent(text);

  const res = await fetch(url);
  const data = await res.json();

  const translated = data[0].map(x => x[0]).join("");
  document.getElementById("output").innerText = translated;
}
</script>

</body>
</html>
